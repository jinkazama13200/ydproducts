services:
  backend:
    build: ./backend
    container_name: yd-backend
    ports:
      - "8787:8787"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=8787
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: yd-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped